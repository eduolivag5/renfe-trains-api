spring.application.name=Renfe-Trains

# DATABASE CONFIGURATION
spring.datasource.url=jdbc:postgresql://62.238.8.177:5432/renfe_db
spring.datasource.username=admin_renfe
spring.datasource.password=Scottville%7
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE CONFIGURATION
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# BATCH INSERT OPTIMIZATION (Crucial para los ZIP de Renfe)
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/api-docs
server.forward-headers-strategy=framework